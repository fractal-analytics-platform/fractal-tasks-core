name: Build package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install hatch
        run: python -m pip install hatch

      - name: Build package
        run: python -m hatch build
